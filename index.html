<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tải Ứng Dụng</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        padding: 50px;
      }
      .container {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        display: inline-block;
      }
      h1 {
        color: #333;
      }
      .download-btn {
        display: inline-block;
        background-color: #28a745;
        color: white;
        padding: 15px 30px;
        text-decoration: none;
        border-radius: 5px;
        font-size: 18px;
        margin-top: 20px;
      }
      .download-btn:hover {
        background-color: #218838;
      }
    </style>
    <script>
      function updateDownloadLink() {
        fetch("https://example.com/latest-apk-link") // Thay thế bằng API thực tế
          .then((response) => response.json())
          .then((data) => {
            document.getElementById("download-link").href = data.apk_url;
          })
          .catch((error) => console.error("Lỗi tải link APK:", error));
      }
      window.onload = updateDownloadLink;
    </script>
  </head>
  <body>
    <div class="container">
      <h1>Chào mừng bạn!</h1>
      <p>Tải xuống ứng dụng của chúng tôi ngay bây giờ.</p>
      <a id="download-link" href="#" class="download-btn">Tải về APK</a>
    </div>
  </body>
</html>
